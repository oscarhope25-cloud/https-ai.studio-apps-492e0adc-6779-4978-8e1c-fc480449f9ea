<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1c0205" />
      <stop offset="100%" stop-color="#030001" />
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Dark pitch background -->
  <rect width="100%" height="100%" rx="120" fill="url(#bg-grad)" stroke="#2e0306" stroke-width="6" />
  
  <!-- Outer Gothic Concentric Rings -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#5a060f" stroke-dasharray="4 12" stroke-width="4" />
  <circle cx="256" cy="256" r="160" fill="none" stroke="#2e0306" stroke-width="2" />
  <circle cx="256" cy="256" r="140" fill="none" stroke="#5a060f" stroke-width="3" />

  <!-- Crimson Gothic Star / Emblem (Center) -->
  <g filter="url(#glow)">
    <!-- 8-Point Star shape -->
    <path d="M 256 96 L 274 214 L 392 232 L 274 250 L 256 368 L 238 250 L 120 232 L 238 214 Z" fill="#b30e1d" stroke="#fa5a5a" stroke-width="2" />
    <path d="M 256 140 L 268 220 L 348 232 L 268 244 L 256 324 L 244 244 L 164 232 L 244 220 Z" fill="#5a060f" />
  </g>
  
  <!-- Inner core dot -->
  <circle cx="256" cy="232" r="8" fill="#ffffff" filter="url(#glow)" />
</svg>
